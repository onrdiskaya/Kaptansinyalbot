name: Sinyal Taraması

on:
  schedule:
    - cron: "*/15 * * * *"   # her 15 dakikada bir otomatik çalışır
  workflow_dispatch: {}       # GitHub'dan elle "Run workflow" ile de tetiklenebilir

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Botu çalıştır
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Değişiklikleri kaydet (watchlist.json / state.json)
        run: |
          git config user.name "kesisim-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add watchlist.json state.json
          git diff --cached --quiet || git commit -m "sinyal taraması güncellendi"
          git push
